backend:
  name: github
  repo: birdcokr-yun/bird-diary
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "posts"
    label: "글"
    label_singular: "글"
    folder: "content/posts"
    create: true
    format: "json"
    extension: "json"
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{date}} — {{title}}"
    fields:
      - label: "제목"
        name: "title"
        widget: "string"
      - label: "날짜"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
      - label: "미리보기 문장"
        name: "excerpt"
        widget: "text"
      - label: "사진"
        name: "image"
        widget: "image"
        required: false
        hint: "카드와 대표글 자리에 표시될 사진입니다. 비워두면 색블록이 대신 표시됩니다."
